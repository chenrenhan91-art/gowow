        const dragRef = useRef({ active: false, x: 0, y: 0, baseX: 0, baseY: 0 });
        const lastProjectionTimeRef = useRef(0);

        const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
        const degToRad = (deg) => (deg * Math.PI) / 180;

        const selectedSpot = worldExplorePoints.find((spot) => spot.id === selectedSpotId) || null;

        useEffect(() => {
          const safeIndex = Math.max(0, Math.min(initialCardIndex, feedCards.length - 1));
          setCurrentIndex(safeIndex);
        }, [initialCardIndex]);

        const handleSearch = () => {
          setIsSearching(true); setCards([]); setViewMode('feed');
          setTimeout(() => { setIsSearching(false); setCards(feedCards); setCurrentIndex(0); }, 3000);
        };

        const handleSwipeAction = (actionType) => {
          if (exitDirection || currentIndex >= cards.length) return;
          setExitDirection(actionType);
          setTimeout(() => { setCurrentIndex(prev => prev + 1); setExitDirection(null); }, 350);
        };

        const handleLikeToDetail = () => {
          if (exitDirection || currentIndex >= cards.length) return;
          setExitDirection('right');
          setTimeout(() => {
            openFeedDetail(cards[currentIndex], currentIndex);
            setExitDirection(null);
          }, 280);
        };

        const latLonToVector3 = (lat, lon, radius) => {
          const latRad = degToRad(lat);
          const lonRad = degToRad(lon);
          return new window.THREE.Vector3(
            radius * Math.cos(latRad) * Math.sin(lonRad),
            radius * Math.sin(latRad),
            radius * Math.cos(latRad) * Math.cos(lonRad)
          );
        };

        useEffect(() => {
          if (threeReady) return;
          const onThreeReady = () => setThreeReady(true);
          window.addEventListener('three-ready', onThreeReady);
          return () => window.removeEventListener('three-ready', onThreeReady);
        }, [threeReady]);

        useEffect(() => {
          if (!threeReady || !globeHostRef.current || sceneRef.current || typeof window.THREE === 'undefined') return;

          const THREE = window.THREE;

          const host = globeHostRef.current;
          const scene = new THREE.Scene();
          const camera = new THREE.PerspectiveCamera(38, host.clientWidth / host.clientHeight, 0.1, 100);
          camera.position.set(0, 0.1, 4.2);

          const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
          renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
          renderer.setSize(host.clientWidth, host.clientHeight);
          renderer.outputColorSpace = THREE.SRGBColorSpace;
          host.appendChild(renderer.domElement);

          const root = new THREE.Group();
          scene.add(root);

          const ambient = new THREE.AmbientLight(0x88b4ff, 0.65);
          const keyLight = new THREE.DirectionalLight(0xc7e8ff, 1.2);
          keyLight.position.set(3, 2, 4);
          const rimLight = new THREE.PointLight(0x22d3ee, 0.85, 20);
          rimLight.position.set(-3.2, -1.2, 2.8);
          scene.add(ambient, keyLight, rimLight);

          const textureCanvas = document.createElement('canvas');
          textureCanvas.width = 1024;
          textureCanvas.height = 512;
          const ctx = textureCanvas.getContext('2d');
          const grad = ctx.createLinearGradient(0, 0, textureCanvas.width, textureCanvas.height);
          grad.addColorStop(0, '#0b1735');
          grad.addColorStop(0.45, '#14478d');
          grad.addColorStop(1, '#0b1022');
          ctx.fillStyle = grad;
          ctx.fillRect(0, 0, textureCanvas.width, textureCanvas.height);

          ctx.strokeStyle = 'rgba(148, 210, 255, 0.23)';
          ctx.lineWidth = 1;
          for (let x = 0; x <= textureCanvas.width; x += 64) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, textureCanvas.height);
            ctx.stroke();
          }
          for (let y = 0; y <= textureCanvas.height; y += 48) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(textureCanvas.width, y);
            ctx.stroke();
          }

          const drawContinent = (points, color) => {
            ctx.fillStyle = color;
            ctx.beginPath();
            points.forEach((p, idx) => {
              if (idx === 0) ctx.moveTo(p[0], p[1]);
              else ctx.lineTo(p[0], p[1]);
            });
            ctx.closePath();
            ctx.fill();
          };

          drawContinent([[120, 130], [220, 85], [320, 96], [330, 170], [250, 218], [148, 193]], 'rgba(56, 189, 248, 0.26)');
          drawContinent([[390, 118], [470, 95], [585, 112], [625, 188], [560, 238], [458, 215]], 'rgba(34, 197, 94, 0.19)');
          drawContinent([[700, 128], [774, 115], [875, 145], [900, 205], [832, 245], [738, 222]], 'rgba(14, 165, 233, 0.24)');

          const globeTexture = new THREE.CanvasTexture(textureCanvas);
          globeTexture.colorSpace = THREE.SRGBColorSpace;
          globeTexture.wrapS = THREE.RepeatWrapping;
          globeTexture.wrapT = THREE.ClampToEdgeWrapping;

          const globeRadius = 1.45;
          const globe = new THREE.Mesh(
            new THREE.SphereGeometry(globeRadius, 80, 80),
            new THREE.MeshStandardMaterial({
              map: globeTexture,
              roughness: 0.55,
              metalness: 0.2,
              emissive: new THREE.Color('#0a3c7e'),
              emissiveIntensity: 0.32,
            })
          );

          const globeGrid = new THREE.Mesh(
            new THREE.SphereGeometry(globeRadius * 1.004, 44, 44),
            new THREE.MeshBasicMaterial({
              color: 0x8ad8ff,
              wireframe: true,
              transparent: true,
              opacity: 0.12,
            })
          );

          const atmosphere = new THREE.Mesh(
            new THREE.SphereGeometry(globeRadius * 1.075, 80, 80),
            new THREE.MeshBasicMaterial({
              color: 0x4cc9ff,
              transparent: true,
              opacity: 0.16,
              side: THREE.BackSide,
            })
          );

          root.add(globe, globeGrid, atmosphere);

          const markerMap = {};
          worldExplorePoints.forEach((spot) => {
            const markerGroup = new THREE.Group();
            const base = new THREE.Mesh(
              new THREE.SphereGeometry(0.03, 16, 16),
              new THREE.MeshBasicMaterial({ color: 0xffb36a })
            );
            const halo = new THREE.Mesh(
              new THREE.SphereGeometry(0.05, 16, 16),
              new THREE.MeshBasicMaterial({ color: 0xff9f43, transparent: true, opacity: 0.24 })
            );
            markerGroup.add(base, halo);
            markerGroup.position.copy(latLonToVector3(spot.lat, spot.lon, globeRadius * 1.01));
            root.add(markerGroup);
            markerMap[spot.id] = { markerGroup, halo, spot };
          });

          const resize = () => {
            if (!globeHostRef.current) return;
            const width = globeHostRef.current.clientWidth;
            const height = globeHostRef.current.clientHeight;
            camera.aspect = width / Math.max(height, 1);
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
          };

          const updateProjectedMarkers = (now) => {
            if (now - lastProjectionTimeRef.current < 32) return;
            lastProjectionTimeRef.current = now;

            const hostRect = globeHostRef.current.getBoundingClientRect();
            const cameraDir = camera.position.clone().normalize();
            const projected = [];

            Object.values(markerMap).forEach(({ markerGroup, spot }) => {
              const worldPos = markerGroup.getWorldPosition(new THREE.Vector3());
              const normalized = worldPos.clone().normalize();
              const dot = normalized.dot(cameraDir);
              const ndc = worldPos.clone().project(camera);
              const inView = ndc.z > -1 && ndc.z < 1 && dot > 0.1;
              if (!inView && spot.id !== selectedSpotId) return;

              projected.push({
                id: spot.id,
                spot,
                x: ((ndc.x + 1) * 0.5) * hostRect.width,
                y: ((1 - ndc.y) * 0.5) * hostRect.height,
                z: dot,
                alwaysShow: spot.id === selectedSpotId,
              });
            });

            projected.sort((a, b) => b.z - a.z);
            const packed = [];
            projected.forEach((item) => {
              const minGap = item.alwaysShow ? 20 : 42;
              const overlapped = packed.some((kept) => Math.hypot(item.x - kept.x, item.y - kept.y) < minGap && !item.alwaysShow);
              if (!overlapped || item.alwaysShow) packed.push(item);
            });

            setProjectedMarkers(packed);
          };

          const animate = (now = 0) => {
            animationFrameRef.current = requestAnimationFrame(animate);

            if (!dragRef.current.active && !selectedSpotId && viewMode === 'map') {
              targetRotationRef.current.y += 0.0018;
            }

            currentRotationRef.current.x = THREE.MathUtils.lerp(currentRotationRef.current.x, targetRotationRef.current.x, 0.09);
            currentRotationRef.current.y = THREE.MathUtils.lerp(currentRotationRef.current.y, targetRotationRef.current.y, 0.09);
            root.rotation.x = currentRotationRef.current.x;
            root.rotation.y = currentRotationRef.current.y;

            Object.entries(markerMap).forEach(([id, marker]) => {
              const active = id === selectedSpotId;
              marker.halo.scale.setScalar(active ? 1.6 : 1.0);
              marker.halo.material.opacity = active ? 0.5 : 0.24;
            });

            updateProjectedMarkers(now);
            renderer.render(scene, camera);
          };

          const handlePointerMove = (clientX, clientY) => {
            if (!dragRef.current.active) return;
            const deltaX = clientX - dragRef.current.x;
            const deltaY = clientY - dragRef.current.y;
            targetRotationRef.current.y = dragRef.current.baseY + deltaX * 0.0054;
            targetRotationRef.current.x = clamp(dragRef.current.baseX + deltaY * 0.0043, -0.85, 0.85);
          };

          const onPointerDown = (event) => {
            const p = event.touches ? event.touches[0] : event;
            if (!p) return;
            dragRef.current.active = true;
            dragRef.current.x = p.clientX;
            dragRef.current.y = p.clientY;
            dragRef.current.baseX = targetRotationRef.current.x;
            dragRef.current.baseY = targetRotationRef.current.y;
            setIsDraggingGlobe(true);
          };

          const onPointerUp = () => {
            dragRef.current.active = false;
            setIsDraggingGlobe(false);
          };

          const onPointerMove = (event) => {
            const p = event.touches ? event.touches[0] : event;
            if (!p) return;
            handlePointerMove(p.clientX, p.clientY);
          };

          host.addEventListener('mousedown', onPointerDown);
          host.addEventListener('touchstart', onPointerDown, { passive: true });
          window.addEventListener('mousemove', onPointerMove);
          window.addEventListener('touchmove', onPointerMove, { passive: true });
          window.addEventListener('mouseup', onPointerUp);
          window.addEventListener('touchend', onPointerUp);
          window.addEventListener('resize', resize);

          sceneRef.current = scene;
          cameraRef.current = camera;
          rendererRef.current = renderer;
          globeGroupRef.current = root;
          markerMeshMapRef.current = markerMap;
          setGlobeReady(true);
          animate();

          return () => {
            if (animationFrameRef.current) cancelAnimationFrame(animationFrameRef.current);
            host.removeEventListener('mousedown', onPointerDown);
            host.removeEventListener('touchstart', onPointerDown);
            window.removeEventListener('mousemove', onPointerMove);
            window.removeEventListener('touchmove', onPointerMove);
            window.removeEventListener('mouseup', onPointerUp);
            window.removeEventListener('touchend', onPointerUp);
            window.removeEventListener('resize', resize);
            if (rendererRef.current) {
              rendererRef.current.dispose();
              if (rendererRef.current.domElement.parentNode) rendererRef.current.domElement.parentNode.removeChild(rendererRef.current.domElement);
            }
            sceneRef.current = null;
            cameraRef.current = null;
            rendererRef.current = null;
            globeGroupRef.current = null;
          };
        }, [threeReady]);

        useEffect(() => {
          if (!selectedSpot) return;
          targetRotationRef.current.y = -degToRad(selectedSpot.lon);
          targetRotationRef.current.x = clamp(degToRad(selectedSpot.lat * 0.8), -0.85, 0.85);
        }, [selectedSpotId]);

        useEffect(() => {
          if (viewMode !== 'map') {
            setHoverSpotId(null);
          }
        }, [viewMode]);

        const focusSpot = (spot) => {
          setSelectedSpotId(spot.id);

        const renderScoreBars = (scores) => (
          <div className="grid grid-cols-2 gap-x-4 gap-y-1.5 mt-2.5">
            {Object.entries(scores).map(([dimension, score]) => (
              <div key={dimension} className="flex items-center text-[10px]">
                <span className="w-8 text-gray-500">{dimension}</span>
                <div className="flex-1 h-1 bg-gray-200 rounded-full mx-1.5 overflow-hidden">
                  <div className={`h-full rounded-full ${score >= 4 ? 'bg-orange-500' : score >= 2.5 ? 'bg-yellow-400' : 'bg-red-400'}`} style={{ width: `${(score / 5) * 100}%` }}></div>
                </div>
                <span className="w-4 text-right font-bold text-gray-800">{score.toFixed(1)}</span>
              </div>
            ))}
          </div>
        );

        return (
          <div className="relative w-full h-full bg-[#F3F4F6] overflow-hidden flex flex-col font-sans">
            {/* 顶部栏 */}
            <div className="relative z-20 pt-12 pb-2 px-5 bg-white shadow-sm">
              <div className="flex justify-between items-center mb-4">
                <div className="flex flex-col">
                  <span className="text-gray-900 font-black text-2xl tracking-tighter leading-none">gowow</span>
                  <span className="text-orange-500 text-[9px] font-bold tracking-widest ml-0.5 mt-0.5">去哇哦</span>
                </div>
                <div className="bg-gray-100 p-1 rounded-full flex items-center">
                  <button onClick={() => setViewMode('feed')} className={`px-3 py-1.5 rounded-full text-xs font-bold transition-all ${viewMode === 'feed' ? 'bg-white text-gray-900 shadow-sm' : 'text-gray-400'}`}>推荐流</button>
                  <button onClick={() => setViewMode('map')} className={`px-3 py-1.5 rounded-full text-xs font-bold transition-all flex items-center gap-1 ${viewMode === 'map' ? 'bg-orange-500 text-white shadow-md' : 'text-gray-400'}`}><MapIcon className="w-3 h-3" />地图</button>
                </div>
              </div>
              <div className="flex items-center bg-gray-50 border border-gray-200 rounded-full p-1 shadow-sm focus-within:ring-2 ring-orange-500/50">
                <input type="text" placeholder="搜索全球隐秘角落..." className="flex-1 bg-transparent border-none outline-none text-gray-800 text-sm px-4 placeholder-gray-400" onKeyDown={(e) => e.key === 'Enter' && handleSearch()} />
                <button onClick={handleSearch} className="p-2 bg-orange-500 rounded-full text-white"><Search className="w-4 h-4" /></button>
              </div>
            </div>

            {/* 加载动画 */}
            {isSearching && (
              <div className="absolute inset-0 flex flex-col items-center justify-center bg-gray-900/95 backdrop-blur-md z-40">
                <div className="loader-container">
                  <div className="loader-moon"><div className="loader-crater loader-crater1"></div><div className="loader-crater loader-crater2"></div><div className="loader-crater loader-crater3"></div></div>
                  <div className="loader-orbit">
                    <div className="loader-rv-wrapper">
                      <div className="loader-fire"></div>
                      <svg viewBox="0 0 240 140" className="w-[60px] h-[40px] drop-shadow-lg"><path d="M 30 110 L 30 30 C 30 15, 45 10, 60 10 L 140 10 C 160 10, 190 15, 205 30 C 215 40, 215 50, 205 55 L 180 55 L 195 85 C 200 95, 198 100, 188 105 C 180 110, 170 110, 160 110 Z" fill="#F8FAFC" /><path d="M 30 65 L 145 65 L 165 90 L 185 100 L 157 100 L 137 70 L 30 70 Z" fill="#0EA5E9"/><path d="M 30 70 L 137 70 L 157 100 L 185 100 L 182 105 L 153 105 L 133 75 L 30 75 Z" fill="#EC4899"/><path d="M 30 75 L 133 75 L 153 105 L 182 105 L 178 110 L 150 110 L 130 80 L 30 80 Z" fill="#F59E0B"/><circle cx="57.5" cy="110" r="14" fill="#111827" /><circle cx="152.5" cy="110" r="14" fill="#111827" /></svg>
                    </div>
                  </div>
                  <svg className="loader-curve" viewBox="0 0 300 300"><path id="curve-path" d="M 150, 150 m -130, 0 a 130,130 0 1,0 260,0 a 130,130 0 1,0 -260,0" /><text><textPath href="#curve-path">GOWOW IS SEARCHING FOR REAL REVIEWS • </textPath></text></svg>
                </div>
                <h2 className="mt-6 text-lg font-bold tracking-widest text-orange-400 animate-pulse">寻找灵魂的短暂栖息地...</h2>
              </div>

            {/* 滑卡流区 */}
            <div className={`flex-1 relative z-10 w-full flex flex-col items-center justify-start pt-3 pb-24 transition-opacity duration-500 ${viewMode === 'map' ? 'opacity-0 pointer-events-none' : 'opacity-100'}`}>
              {cards.length > 0 && currentIndex < cards.length ? (
                <>
                  <div className="relative w-[92%] flex-1 min-h-0 perspective-1000">
                    {cards.map((card, index) => {
                      if (index < currentIndex) return null;
                      const isTop = index === currentIndex;
                      const isNext = index === currentIndex + 1;
                      if (!isTop && !isNext) return null;

                      let swipeTransform = isTop ? 'translate(0, 0) scale(1) rotateX(0deg) rotateY(0deg)' : 'translate(0, 24px) scale(0.92) rotateX(5deg)';

                      if (isTop && exitDirection) {
                        swipeOpacity = 0;
                        if (exitDirection === 'left') swipeTransform = 'translate(-120%, 10%) rotateZ(-15deg) rotateY(-30deg) scale(0.9)';
                        if (exitDirection === 'right') swipeTransform = 'translate(120%, 10%) rotateZ(15deg) rotateY(30deg) scale(0.9)';

                      return (
                        <div key={card.id} className="absolute inset-0 w-full bg-white rounded-[24px] shadow-xl overflow-hidden flex flex-col transition-all duration-300 ease-out origin-bottom" style={{ transform: swipeTransform, opacity: swipeOpacity, zIndex: isTop ? 20 : 10 }}>
                          <button onClick={() => openAuthorChat(card.author)} className="absolute top-3 left-3 z-30 flex items-center gap-2 bg-black/40 backdrop-blur-md px-2.5 py-1.5 rounded-full border border-white/20">

                            </div>

                            <div className="bg-gradient-to-br from-indigo-50 to-blue-50/50 p-2.5 rounded-xl border border-blue-100 relative mt-auto shadow-sm">
                              <div className="flex items-center gap-1 mb-1"><Sparkles className="w-3.5 h-3.5 text-blue-600" /><span className="text-blue-700 text-[10px] font-black uppercase tracking-wider">gowow AI 真实提炼</span></div>
                              <p className="text-[11px] text-blue-900/80 leading-relaxed font-medium line-clamp-2">{card.aiIntro}</p>
                            </div>
                            {renderScoreBars(card.scores)}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                  <div className="relative z-20 flex justify-center items-center gap-6 mt-4 mb-2 flex-shrink-0">
                    <button onClick={() => handleSwipeAction('left')} className="w-14 h-14 bg-white rounded-full flex items-center justify-center shadow-lg border border-gray-100 text-gray-400 hover:text-gray-900 active:scale-90"><X className="w-6 h-6" strokeWidth={2.5} /></button>

                    <button onClick={handleLikeToDetail} className="w-16 h-16 bg-gradient-to-tr from-orange-500 to-red-500 rounded-full flex items-center justify-center shadow-lg text-white active:scale-90"><Heart className="w-7 h-7 fill-white" /></button>
                  </div>
                </>
              ) : !isSearching && (
                <div className="flex flex-col items-center justify-center h-full text-center px-8 z-20 pb-20">
                  <div className="w-20 h-20 bg-gray-200 rounded-full flex items-center justify-center mb-4"><Compass className="w-10 h-10 text-gray-400" /></div>

                  <button
                    onClick={() => {

            </div>

            {/* 世界地图探索区 */}
            <div className={`absolute inset-x-0 top-[122px] bottom-[76px] px-4 pt-3 transition-all duration-500 ${viewMode === 'map' ? 'opacity-100 z-30' : 'opacity-0 pointer-events-none z-0'}`}>
              <div className="relative h-full w-full rounded-[28px] overflow-hidden border border-white/20 shadow-[0_40px_90px_rgba(0,0,0,0.45)] bg-gradient-to-br from-[#0B1225] via-[#101A37] to-[#08101F]">
                <div className="absolute inset-0 opacity-30" style={{ backgroundImage: 'radial-gradient(circle at 20% 20%, rgba(255,255,255,0.16) 0 1px, transparent 1px)', backgroundSize: '28px 28px' }}></div>
                <div className="absolute top-3 left-3 right-3 flex items-center justify-between text-white/90 z-20">
                  <div>
                    <p className="text-[11px] tracking-[0.24em] uppercase text-orange-300/90">World Explorer</p>
                    <h3 className="text-sm font-bold mt-0.5">世界地图探索</h3>
                  </div>
                  <div className="text-[10px] text-white/60 bg-white/10 px-2.5 py-1 rounded-full border border-white/15">拖拽旋转 · 点击看见闻</div>
                </div>

                <div className="absolute inset-x-0 top-10 bottom-0 flex items-center justify-center">
                  <div className="relative w-[92%] max-w-[420px] aspect-square">
                    <div className="absolute inset-0 rounded-full bg-cyan-300/20 blur-2xl"></div>
                    <div ref={globeHostRef} className="absolute inset-0 rounded-full cursor-grab active:cursor-grabbing"></div>

                    {!globeReady && (
                      <div className="absolute inset-0 rounded-full border border-cyan-200/20 bg-black/30 backdrop-blur-sm flex items-center justify-center text-cyan-100 text-sm tracking-wider">
                        地球模型加载中...
                      </div>
                    )}

                  ))}

              </div>
            </div>

            {activeMemeBadge && (
              <div className="absolute inset-0 z-[70] bg-black/65 backdrop-blur-sm flex items-end">
                <div className="w-full bg-white rounded-t-[30px] p-5 pb-8 max-h-[82%] overflow-y-auto">
                  <div className="flex justify-between items-center mb-4">
                    <h3 className="text-lg font-black text-gray-900">成就分享页</h3>
                    <button onClick={() => setActiveMemeBadge(null)} className="w-9 h-9 rounded-full bg-gray-100 flex items-center justify-center text-gray-600"><X className="w-5 h-5" /></button>
                  </div>

                  <div className="rounded-3xl p-4 bg-gradient-to-br from-cyan-500 via-teal-500 to-emerald-500 text-white shadow-xl">
                    <div className="text-xs opacity-90 tracking-wider">GOWOW MEME ACHIEVEMENT</div>
                    <div className="mt-2 text-2xl">{activeMemeBadge.emoji}</div>
                    <h4 className="mt-1 text-xl font-black leading-tight">{activeMemeBadge.title}</h4>
                    <p className="text-sm text-white/90 mt-2 leading-relaxed">{activeMemeBadge.viralText}</p>
                    <div className="mt-3 text-xs bg-white/20 border border-white/25 rounded-xl px-3 py-2">口令：GOWOW-{activeMemeBadge.id.toUpperCase()} · 进群回口令可领加成</div>
                  </div>

                  <div className="mt-4 rounded-2xl border border-gray-100 bg-gray-50 p-3.5">
                    <p className="text-xs text-gray-500">裂变奖励机制</p>
                    <p className="text-sm font-bold text-gray-900 mt-1">{activeMemeBadge.reward}</p>
                  </div>

                  <div className="mt-4 space-y-2.5">
                    <button onClick={handleCopyShareText} className="w-full py-3 rounded-full bg-gray-900 text-white font-bold text-sm flex items-center justify-center gap-2"><Share2 className="w-4 h-4" />复制梗图文案</button>
                    <button onClick={handleGroupShare} className="w-full py-3 rounded-full bg-gradient-to-r from-cyan-500 to-teal-500 text-white font-bold text-sm flex items-center justify-center gap-2"><MessageCircle className="w-4 h-4" />一键发到群聊</button>
                    <button onClick={() => setShareToast('组队口令已生成：拉 3 位好友进群可领双倍探索值')} className="w-full py-3 rounded-full bg-emerald-50 text-emerald-700 border border-emerald-200 font-bold text-sm flex items-center justify-center gap-2"><Sparkles className="w-4 h-4" />发起组队裂变</button>
                  </div>

                  {shareToast && (
                    <div className="mt-4 text-center text-xs text-teal-700 bg-teal-50 border border-teal-200 rounded-xl px-3 py-2 font-bold">{shareToast}</div>
                  )}
                </div>
              </div>
            )}

            {/* 底部导航 */}
            <div className="absolute bottom-0 w-full h-[76px] bg-white border-t border-gray-100 flex justify-around items-center px-4 pb-4 z-[60]">
              <button onClick={() => navigate('home')} className="flex flex-col items-center text-gray-400 hover:text-gray-900"><Compass className="w-6 h-6 mb-1" /><span className="text-[10px] font-medium">探索</span></button>
              <button onClick={() => navigate('planner')} className="flex flex-col items-center text-gray-400 hover:text-gray-900"><MapIcon className="w-6 h-6 mb-1" /><span className="text-[10px] font-medium">规划</span></button>
              <button onClick={() => navigate('social')} className="flex flex-col items-center text-gray-400 hover:text-gray-900"><MessageCircle className="w-6 h-6 mb-1" /><span className="text-[10px] font-medium">社交</span></button>
              <button onClick={() => navigate('profile')} className="flex flex-col items-center text-orange-500"><User className="w-6 h-6 mb-1" /><span className="text-[10px] font-bold">我的</span></button>
            </div>
          </div>
        );
      };


      // ================= 主应用 Router =================
      function App() {
        const [currentPage, setCurrentPage] = useState('onboarding');
        const [selectedFeedCard, setSelectedFeedCard] = useState(null);
        const [selectedFeedIndex, setSelectedFeedIndex] = useState(0);
        const [homeStartIndex, setHomeStartIndex] = useState(0);
        const [selectedAuthor, setSelectedAuthor] = useState(null);
        const [chatMap, setChatMap] = useState({});

        const openFeedDetail = (card, activeIndex) => {
          const fallbackIdx = feedCards.findIndex((item) => item.id === card.id);
          const idx = Number.isInteger(activeIndex) ? activeIndex : fallbackIdx;
          setSelectedFeedIndex(idx >= 0 ? idx : 0);
          setSelectedFeedCard(card);
          setCurrentPage('feedDetail');
        };

        const goToNextFeedCard = () => {
          const nextIndex = (selectedFeedIndex + 1) % feedCards.length;
          setHomeStartIndex(nextIndex);
          setCurrentPage('home');
        };

        const openAuthorChat = (author) => {
          setSelectedAuthor(author);
          setCurrentPage('authorChat');
          setChatMap((prev) => {
            if (prev[author.name]) return prev;
            return {
              ...prev,
              [author.name]: [
                { id: `${author.name}-init`, role: 'author', text: `你好，我是${author.name}，很高兴认识你。你想了解哪个目的地？` },
              ],
            };
          });
        };

        const sendChatMessage = (text) => {
          if (!selectedAuthor) return;
          const authorName = selectedAuthor.name;
          const myMsg = { id: `${Date.now()}-me`, role: 'me', text };
          setChatMap((prev) => {
            const list = prev[authorName] || [];
            return { ...prev, [authorName]: [...list, myMsg] };
          });

          const autoReply = `收到啦，我建议你先看交通和最佳拍摄时间。需要我给你发一版 ${selectedFeedCard?.location || '该地'} 的简要攻略吗？`;
          setTimeout(() => {
            setChatMap((prev) => {
              const list = prev[authorName] || [];
              return { ...prev, [authorName]: [...list, { id: `${Date.now()}-author`, role: 'author', text: autoReply }] };
            });
          }, 700);
        };

        return (
          <div className="relative w-full h-screen bg-gray-900 overflow-hidden font-sans flex flex-col justify-center items-center">
            <style>{globalStyles}</style>

            {/* 统一唯一的手机壳模拟 */}
            <div className="relative w-full h-full sm:w-[375px] sm:h-[812px] sm:rounded-[3rem] sm:border-[8px] border-gray-800 bg-black overflow-hidden shadow-2xl flex flex-col">

              {currentPage === 'onboarding' && <ScreenOnboarding navigate={setCurrentPage} />}
              {currentPage === 'home' && <ScreenHomeFeed navigate={setCurrentPage} openFeedDetail={openFeedDetail} openAuthorChat={openAuthorChat} initialCardIndex={homeStartIndex} />}
              {currentPage === 'feedDetail' && <ScreenFeedDetail navigate={setCurrentPage} selectedCard={selectedFeedCard} openAuthorChat={openAuthorChat} goToNextFeedCard={goToNextFeedCard} />}
              {currentPage === 'authorChat' && <ScreenAuthorChat navigate={setCurrentPage} author={selectedAuthor} chatMessages={chatMap[selectedAuthor?.name] || []} onSendMessage={sendChatMessage} />}
              {currentPage === 'detail' && <ScreenPlaceDetail navigate={setCurrentPage} />}
              {currentPage === 'review' && <ScreenWriteReview navigate={setCurrentPage} />}
              {currentPage === 'planner' && <ScreenAITripPlanner navigate={setCurrentPage} />}
              {currentPage === 'social' && <ScreenSocialHub navigate={setCurrentPage} />}
              {currentPage === 'profile' && <ScreenProfileGamification navigate={setCurrentPage} />}

            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
