              <button onClick={() => navigate('profile')} className="w-full bg-gray-900 text-white rounded-full py-3.5 font-bold flex items-center justify-center gap-2 active:scale-95 shadow-xl"><Send className="w-4 h-4" /><span>发布并获取 50 探索值</span></button>

              <h1 className="text-2xl font-black text-gray-900 mb-1">AI 行程规划</h1>
              <p className="text-sm text-gray-500">只需几秒，为您定制专属旅游路线</p>

            <div className="flex-1 overflow-y-auto p-5 pb-24 space-y-5">
              <div className="bg-white p-5 rounded-3xl shadow-sm border border-gray-100">
                 <label className="text-sm font-bold text-gray-900 block mb-3">我想去探索...</label>
                 <input type="text" placeholder="输入国家或城市 (如: 冰岛、京都)" className="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 text-sm mb-4 outline-none focus:ring-2 ring-orange-500/50" />

                     <button key={b.id} className={`p-3 rounded-2xl border text-center transition-all ${b.id === 'medium' ? 'border-orange-500 bg-orange-50 text-orange-600' : 'border-gray-200 text-gray-500'}`}>
                       <div className="text-xl mb-1">{b.icon}</div><div className="text-xs font-bold">{b.label}</div>
                     </button>
                   ))}
                 </div>
              </div>
              <button onClick={() => alert('行程生成中... (演示版本)')} className="w-full bg-gradient-to-r from-orange-500 to-red-500 text-white rounded-full py-4 font-bold flex items-center justify-center gap-2 shadow-lg shadow-orange-500/30 active:scale-95 transition-transform"><Sparkles className="w-5 h-5" /> 生成专属行程</button>
            </div>
            {/* 底部导航 */}
            <div className="absolute bottom-0 w-full h-[76px] bg-white border-t border-gray-100 flex justify-around items-center px-6 pb-4 z-[60]">
              <button onClick={() => navigate('home')} className="flex flex-col items-center text-gray-400 hover:text-gray-900"><Compass className="w-6 h-6 mb-1" /><span className="text-[10px] font-medium">探索</span></button>
              <button onClick={() => navigate('planner')} className="flex flex-col items-center text-orange-500"><MapIcon className="w-6 h-6 mb-1" /><span className="text-[10px] font-bold">规划</span></button>
              <button onClick={() => navigate('profile')} className="flex flex-col items-center text-gray-400 hover:text-gray-900"><User className="w-6 h-6 mb-1" /><span className="text-[10px] font-medium">我的</span></button>
            </div>
          </div>
        );
      };

      // 6. Profile 个人主页与荣誉中心
      const ScreenProfileGamification = ({ navigate }) => {
        return (

              <div className="flex items-center gap-4 relative z-10">
                <div className="relative"><img src={userProfileData.avatar} className="w-16 h-16 rounded-full object-cover border-2 border-gray-800" alt="avatar" /><div className="absolute -bottom-2 -right-2 bg-gradient-to-r from-orange-500 to-red-500 text-white text-[10px] font-black px-2 py-0.5 rounded-lg">Lv.{userProfileData.level}</div></div>
                <div className="flex-1">
                  <h2 className="text-lg font-bold text-white flex items-center gap-2">{userProfileData.name}<span className="text-[10px] font-medium bg-white/10 text-orange-400 px-2 py-0.5 rounded-full">{userProfileData.title}</span></h2>
                  <div className="mt-2.5">
                    <div className="flex justify-between text-[10px] text-gray-400 mb-1"><span>EXP 900 (+50新入账)</span><span>升级还需 100</span></div>
                    <div className="w-full h-1.5 bg-gray-800 rounded-full"><div className="h-full bg-gradient-to-r from-orange-500 to-yellow-400 rounded-full w-[90%] relative"><div className="absolute top-0 right-0 bottom-0 w-4 bg-white/30 skew-x-12 animate-pulse"></div></div></div>
                  </div>
                </div>
              </div>
              <div className="flex bg-white/10 backdrop-blur-md border border-white/10 rounded-2xl mt-6 p-4 relative z-10 divide-x divide-white/10">
                <div className="flex-1 flex flex-col items-center"><span className="text-xl font-black text-white">3470</span><span className="text-[10px] text-gray-400 flex items-center gap-1 mt-0.5"><Star className="w-3 h-3 text-yellow-500" /> 探索值</span></div>
                <div className="flex-1 flex flex-col items-center"><span className="text-xl font-black text-white">{userProfileData.stats.countries}</span><span className="text-[10px] text-gray-400 flex items-center gap-1 mt-0.5"><MapPin className="w-3 h-3 text-orange-500" /> 国家足迹</span></div>
              </div>
            </div>
            <div className="flex-1 overflow-y-auto bg-gray-50 pb-24 scrollbar-hide px-5 py-4">
              <h3 className="font-bold text-gray-900 text-base mb-4">探索成就解锁 <span className="text-orange-500 float-right">4/15</span></h3>

                ))}
              </div>
            </div>
            {/* 底部导航 */}
            <div className="absolute bottom-0 w-full h-[76px] bg-white border-t border-gray-100 flex justify-around items-center px-6 pb-4 z-[60]">
              <button onClick={() => navigate('home')} className="flex flex-col items-center text-gray-400 hover:text-gray-900"><Compass className="w-6 h-6 mb-1" /><span className="text-[10px] font-medium">探索</span></button>
              <button onClick={() => navigate('planner')} className="flex flex-col items-center text-gray-400 hover:text-gray-900"><MapIcon className="w-6 h-6 mb-1" /><span className="text-[10px] font-medium">规划</span></button>
              <button onClick={() => navigate('profile')} className="flex flex-col items-center text-orange-500"><User className="w-6 h-6 mb-1" /><span className="text-[10px] font-bold">我的</span></button>
            </div>
          </div>
        );
      };

      function App() {
        const [currentPage, setCurrentPage] = useState('onboarding');

        return (
          <div className="relative w-full h-screen bg-gray-900 overflow-hidden font-sans flex flex-col justify-center items-center">
            <style>{globalStyles}</style>

            {/* 统一唯一的手机壳模拟 */}
            <div className="relative w-full h-full sm:w-[375px] sm:h-[812px] sm:rounded-[3rem] sm:border-[8px] border-gray-800 bg-black overflow-hidden shadow-2xl flex flex-col">

              {currentPage === 'onboarding' && <ScreenOnboarding navigate={setCurrentPage} />}
              {currentPage === 'home' && <ScreenHomeFeed navigate={setCurrentPage} />}
              {currentPage === 'detail' && <ScreenPlaceDetail navigate={setCurrentPage} />}
              {currentPage === 'review' && <ScreenWriteReview navigate={setCurrentPage} />}
              {currentPage === 'planner' && <ScreenAITripPlanner navigate={setCurrentPage} />}
              {currentPage === 'profile' && <ScreenProfileGamification navigate={setCurrentPage} />}

            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
